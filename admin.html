<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Command Center | Kashif Dawar</title>
  
  <!-- PWA & Mobile Meta -->
  <meta name="theme-color" content="#4361ee">
  <link rel="apple-touch-icon" href="Kashifdawar.jpg">
  <link rel="manifest" href="admin-manifest.json">
  <meta name="robots" content="noindex, nofollow">

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js" defer></script>
  
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #05050f;
      --surface: #0d0d1a;
      --card: #16162a;
      --border: rgba(255,255,255,0.08);
      --accent: #4361ee;
      --pink: #f72585;
      --green: #48bb78;
      --text: #e2e8f0;
      --text-muted: #8a8aa3;
      --wa-in: #1f1f35;
      --wa-out: #2a2d4a;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    /* ════════ LAYOUT ════════ */
    .app-container {
      display: flex;
      width: 100%;
      height: 100vh;
    }

    .sidebar {
      width: 380px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 10;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .main-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #080816;
      position: relative;
    }

    /* ════════ SIDEBAR ════════ */
    .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
    .sidebar-header h2 { font-size: 1.5rem; font-weight: 700; color: white; }
    
    .search-bar {
      margin-top: 15px;
      background: var(--card);
      border-radius: 12px;
      padding: 10px 15px;
      display: flex;
      align-items: center;
      border: 1px solid var(--border);
    }
    .search-bar input {
      background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 0.9rem;
    }

    .filters {
      display: flex; gap: 8px; padding: 12px 20px;
      overflow-x: auto; border-bottom: 1px solid var(--border);
    }
    .filter-btn {
      padding: 6px 14px; background: var(--card); border-radius: 20px;
      font-size: 0.75rem; cursor: pointer; border: 1px solid var(--border); white-space: nowrap;
    }
    .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

    .chat-list { flex: 1; overflow-y: auto; }
    .chat-item {
      padding: 15px 20px; border-bottom: 1px solid var(--border);
      cursor: pointer; display: flex; gap: 15px; position: relative; transition: 0.2s;
    }
    .chat-item:hover { background: rgba(255,255,255,0.03); }
    .chat-item.active { background: rgba(67, 97, 238, 0.12); }
    .chat-item.vip { border-left: 4px solid var(--pink); }

    .avatar {
      width: 50px; height: 50px; border-radius: 50%; background: var(--card);
      display: flex; align-items: center; justify-content: center; font-weight: 700;
      color: var(--accent); border: 1px solid var(--border); flex-shrink: 0;
    }
    .chat-meta { flex: 1; min-width: 0; }
    .chat-meta h4 { font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-meta p { font-size: 0.8rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .chat-time { font-size: 0.65rem; color: var(--text-muted); }

    .badge-new {
      width: 10px; height: 10px; background: var(--pink); border-radius: 50%;
      position: absolute; right: 20px; bottom: 20px;
    }

    /* ════════ CHAT WINDOW ════════ */
    .chat-header {
      padding: 12px 20px; background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .chat-header-info { display: flex; align-items: center; gap: 12px; }
    .back-btn { display: none; cursor: pointer; font-size: 1.2rem; margin-right: 10px; }

    .chat-body {
      flex: 1; overflow-y: auto; padding: 20px;
      display: flex; flex-direction: column; gap: 10px;
      background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
      background-blend-mode: overlay; background-color: rgba(5,5,15,0.9);
    }

    .bubble {
      max-width: 80%; padding: 10px 14px; border-radius: 12px;
      font-size: 0.9rem; position: relative; line-height: 1.4;
      word-wrap: break-word;
    }
    .bubble.in { align-self: flex-start; background: var(--wa-in); border-bottom-left-radius: 2px; }
    .bubble.out { align-self: flex-end; background: var(--wa-out); border-bottom-right-radius: 2px; }
    .bubble-info { font-size: 0.6rem; color: var(--text-muted); margin-top: 4px; display: block; text-align: right; }

    .chat-input-area {
      padding: 15px 20px; background: var(--surface);
      border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: center;
    }
    .chat-input-area textarea {
      flex: 1; background: var(--card); border: 1px solid var(--border);
      color: white; border-radius: 20px; padding: 10px 18px; height: 44px;
      resize: none; outline: none; font-family: inherit; font-size: 0.9rem;
    }
    .send-btn {
      width: 44px; height: 44px; border-radius: 50%; background: var(--accent);
      border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: transform 0.2s;
    }
    .send-btn:active { transform: scale(0.9); }

    /* AUTH OVERLAY */
    #auth-screen {
      position: fixed; inset: 0; background: var(--bg); z-index: 9999;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .auth-box {
      background: var(--surface); padding: 30px; border-radius: 20px;
      width: 100%; max-width: 360px; text-align: center; border: 1px solid var(--border);
    }
    .auth-box input {
      width: 100%; padding: 12px; margin: 20px 0; background: var(--card);
      border: 1px solid var(--border); border-radius: 10px; color: white; text-align: center; font-size: 1.1rem;
    }

    /* MOBILE RESPONSIVENESS */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed; width: 100%; height: 100%;
        transform: translateX(0);
      }
      .sidebar.hidden { transform: translateX(-100%); }
      .back-btn { display: block; }
      .bubble { max-width: 90%; }
    }

    /* Visitor Tracking Floating Panel */
    .visitor-stats {
      font-size: 0.65rem; color: var(--text-muted); line-height: 1.2;
    }
  </style>
</head>
<body onload="initAdmin()">

  <!-- Authentication Screen -->
  <div id="auth-screen">
    <div class="auth-box">
      <img src="Kashifdawar.jpg" style="width: 70px; border-radius: 50%; margin-bottom: 15px;">
      <h3>Kashif Admin</h3>
      <p style="font-size: 0.8rem; color: var(--text-muted);">Enter Private Credentials</p>
      <input type="password" id="admin-pin" placeholder="••••" maxlength="8">
      <button onclick="checkAuth()" style="width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: 600;">Unlock Center</button>
    </div>
  </div>

  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>Chats</h2>
        <div class="search-bar">
          <input type="text" id="chat-search" placeholder="Search by name or email..." oninput="doSearch(this.value)">
        </div>
      </div>

      <div class="filters">
        <div class="filter-btn active" id="f-all" onclick="filterBy('all')">All</div>
        <div class="filter-btn" id="f-unread" onclick="filterBy('unread')">Unread</div>
        <div class="filter-btn" id="f-vip" onclick="filterBy('vip')">VIP</div>
        <div class="filter-btn" id="f-today" onclick="filterBy('today')">Today</div>
      </div>

      <div class="chat-list" id="chat-items-container">
        <!-- Chat items injected here -->
      </div>
    </aside>

    <!-- Chat Panel -->
    <main class="main-panel">
      <header class="chat-header">
        <div class="chat-header-info">
          <span class="back-btn" onclick="toggleSidebar(true)">←</span>
          <div id="active-avatar" class="avatar" style="width: 40px; height: 40px;">?</div>
          <div>
            <h4 id="active-name">Select a Conversation</h4>
            <div id="active-status" style="font-size: 0.7rem; color: var(--green);">Waiting for selection...</div>
          </div>
        </div>
        <div id="visitor-data-display" class="visitor-stats"></div>
      </header>

      <div class="chat-body" id="chat-messages">
        <!-- Messages appear here -->
      </div>

      <div class="chat-input-area">
        <textarea id="reply-text" placeholder="Write your message..."></textarea>
        <button class="send-btn" id="send-btn" onclick="handleReply()">
          <span id="send-icon">➤</span>
        </button>
      </div>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, update, push, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    // ══════════════ FIREBASE CONFIG (EXACT AS REQUESTED) ══════════════
    const firebaseConfig = {
      apiKey: "AIzaSyCLJ0NBZ4RsdUiW_P4jUddQzUXvktmdMhc",
      authDomain: "kashif-portfolio-17481.firebaseapp.com",
      databaseURL: "https://kashif-portfolio-17481-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "kashif-portfolio-17481",
      storageBucket: "kashif-portfolio-17481.appspot.com",
      messagingSenderId: "563531649931",
      appId: "1:563531649931:web:ca5a2789f2de2d29486c75"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let allContacts = [];
    let currentActiveId = null;
    let currentFilter = 'all';
    let searchQuery = '';

    // ══════════════ SOUND SYSTEM (EXACT FREQUENCIES PRESERVED) ══════════════
    function playTone(freqs, duration = 0.4, vol = 0.2) {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const masterGain = audioCtx.createGain();
        masterGain.gain.value = vol;
        masterGain.connect(audioCtx.destination);

        freqs.forEach(f => {
          const osc = audioCtx.createOscillator();
          const g = audioCtx.createGain();
          osc.type = f.type || 'sine';
          osc.frequency.value = f.hz;
          g.gain.setValueAtTime(f.at || 0.1, audioCtx.currentTime);
          g.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
          osc.connect(g); g.connect(masterGain);
          osc.start(); osc.stop(audioCtx.currentTime + duration);
        });
      } catch (e) {}
    }

    const sound = {
      newMsg: () => playTone([{ hz: 880, at: 0.1 }, { hz: 1046, at: 0.1 }], 0.4, 0.25),
      reply: () => playTone([{ hz: 523, at: 0.1 }, { hz: 659, at: 0.1 }, { hz: 784, at: 0.2 }], 0.5, 0.22),
      visitor: () => playTone([{ hz: 440, at: 0.05, type: 'sine' }], 0.3, 0.12)
    };

    // ══════════════ AUTH LOGIC ══════════════
    window.checkAuth = () => {
      const pin = document.getElementById('admin-pin').value;
      if (pin === "kashif508") {
        document.getElementById('auth-screen').style.display = 'none';
        localStorage.setItem('kashif_admin_session', Date.now());
        if ('Notification' in window) Notification.requestPermission();
      } else {
        alert("Access Denied");
      }
    };

    // ══════════════ CORE APP LOGIC ══════════════
    window.initAdmin = () => {
      if (localStorage.getItem('kashif_admin_session')) {
        document.getElementById('auth-screen').style.display = 'none';
      }

      // 1. Listen for Contacts
      onValue(ref(db, 'contacts'), (snapshot) => {
        const data = snapshot.val();
        if (!data) return;

        const oldCount = allContacts.length;
        allContacts = Object.entries(data).map(([id, val]) => ({ id, ...val }));
        
        if (oldCount > 0 && allContacts.length > oldCount) {
          sound.newMsg();
          showPush("New Message", "A visitor just reached out.");
        }
        
        renderChatList();
        if (currentActiveId) renderMessages(currentActiveId);
      });

      // 2. Listen for Real-time Visitors (Preserved logic)
      onValue(ref(db, 'visitors'), (snapshot) => {
        if (snapshot.exists()) sound.visitor();
      });
    };

    function renderChatList() {
      const container = document.getElementById('chat-items-container');
      container.innerHTML = '';

      const filtered = allContacts.filter(c => {
        const matchesSearch = (c.name || '').toLowerCase().includes(searchQuery) || (c.email || '').toLowerCase().includes(searchQuery);
        if (currentFilter === 'unread') return matchesSearch && !c.replied;
        if (currentFilter === 'vip') return matchesSearch && (c.message || '').length > 200;
        if (currentFilter === 'today') return matchesSearch && new Date(c.time).toDateString() === new Date().toDateString();
        return matchesSearch;
      }).sort((a, b) => b.time - a.time);

      filtered.forEach(c => {
        const item = document.createElement('div');
        item.className = `chat-item ${currentActiveId === c.id ? 'active' : ''} ${ (c.message || '').length > 200 ? 'vip' : '' }`;
        item.onclick = () => selectConversation(c.id);
        
        const timeStr = new Date(c.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

        item.innerHTML = `
          <div class="avatar">${(c.name || '?').charAt(0).toUpperCase()}</div>
          <div class="chat-meta">
            <div style="display:flex; justify-content:space-between;">
              <h4>${c.name || 'Anonymous'}</h4>
              <span class="chat-time">${timeStr}</span>
            </div>
            <p>${c.message}</p>
          </div>
          ${!c.replied ? '<div class="badge-new"></div>' : ''}
        `;
        container.appendChild(item);
      });
    }

    window.selectConversation = (id) => {
      currentActiveId = id;
      renderChatList();
      renderMessages(id);
      if (window.innerWidth <= 768) toggleSidebar(false);
    };

    function renderMessages(id) {
      const c = allContacts.find(x => x.id === id);
      const box = document.getElementById('chat-messages');
      
      document.getElementById('active-name').innerText = c.name || 'Anonymous Visitor';
      document.getElementById('active-avatar').innerText = (c.name || '?').charAt(0).toUpperCase();
      document.getElementById('active-status').innerText = c.replied ? "Replied" : "Awaiting response";
      
      // Visitor Stats (Preserved Tracking Info)
      document.getElementById('visitor-data-display').innerHTML = `
        IP: ${c.ip || 'N/A'}<br>
        ${c.city || ''}, ${c.country || ''} ${c.flag || ''}<br>
        Device: ${c.device || 'N/A'}
      `;

      box.innerHTML = `
        <div class="bubble in">
          ${c.message}
          <span class="bubble-info">${new Date(c.time).toLocaleString()}</span>
        </div>
      `;

      if (c.replied) {
        box.innerHTML += `
          <div class="bubble out">
            ${c.reply_text || "Sent via EmailJS (Legacy)"}
            <span class="bubble-info">Delivered ✔✔</span>
          </div>
        `;
      }
      box.scrollTop = box.scrollHeight;
    }

    // ══════════════ REPLY LOGIC (EMAILJS PRESERVED) ══════════════
    window.handleReply = async () => {
      const text = document.getElementById('reply-text').value;
      if (!currentActiveId || !text) return;

      const c = allContacts.find(x => x.id === currentActiveId);
      const btnIcon = document.getElementById('send-icon');
      btnIcon.innerText = "⏳";

      try {
        // EmailJS Execution
        emailjs.init("YOUR_PUBLIC_KEY"); // KEEP YOUR KEY HERE
        await emailjs.send("service_id", "template_id", {
          to_name: c.name,
          to_email: c.email,
          message: text,
          from_name: "Kashif Dawar"
        });

        // Update Firebase status
        await update(ref(db, `contacts/${currentActiveId}`), {
          replied: true,
          reply_text: text,
          reply_time: Date.now()
        });

        sound.reply();
        document.getElementById('reply-text').value = '';
        btnIcon.innerText = "✔✔";
        setTimeout(() => btnIcon.innerText = "➤", 2000);
      } catch (err) {
        btnIcon.innerText = "✗";
        setTimeout(() => btnIcon.innerText = "➤", 2000);
      }
    };

    // ══════════════ UTILS ══════════════
    window.doSearch = (v) => { searchQuery = v.toLowerCase(); renderChatList(); };
    window.filterBy = (f) => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('f-' + f).classList.add('active');
      currentFilter = f;
      renderChatList();
    };
    window.toggleSidebar = (show) => {
      document.getElementById('sidebar').classList.toggle('hidden', !show);
    };
    function showPush(t, b) {
      if (Notification.permission === 'granted' && document.visibilityState !== 'visible') {
        new Notification(t, { body: b, icon: 'Kashifdawar.jpg' });
      }
    }

    // Register Scoped SW
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('admin-sw.js');
    }
  </script>
</body>
</html>
