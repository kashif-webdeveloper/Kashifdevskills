<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Command Center | Kashif Dawar</title>
  
  <meta name="theme-color" content="#4361ee">
  <link rel="apple-touch-icon" href="Kashifdawar.jpg">
  <link rel="manifest" href="admin-manifest.json">
  
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js" defer></script>
  
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #05050f;
      --surface: #0d0d1a;
      --card: #16162a;
      --border: rgba(255,255,255,0.08);
      --accent: #4361ee;
      --pink: #f72585;
      --green: #48bb78;
      --text: #e2e8f0;
      --text-muted: #8a8aa3;
      --wa-in: #1f1f35;
      --wa-out: #2a2d4a;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    /* ════════ LAYOUT ════════ */
    .app-container {
      display: flex;
      width: 100%;
      height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 380px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: all 0.3s ease;
    }

    /* Main Chat Panel */
    .main-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #080816;
      position: relative;
    }

    /* ════════ COMPONENTS ════════ */
    .sidebar-header {
      padding: 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    
    .search-container {
      margin-top: 15px;
      background: var(--card);
      border-radius: 12px;
      padding: 8px 15px;
      display: flex;
      align-items: center;
      border: 1px solid var(--border);
    }
    .search-container input {
      background: transparent;
      border: none;
      color: white;
      width: 100%;
      padding-left: 10px;
      outline: none;
    }

    .filter-row {
      display: flex;
      gap: 8px;
      padding: 10px 20px;
      overflow-x: auto;
      border-bottom: 1px solid var(--border);
    }
    .filter-chip {
      padding: 6px 14px;
      background: var(--card);
      border-radius: 20px;
      font-size: 0.75rem;
      cursor: pointer;
      white-space: nowrap;
      border: 1px solid var(--border);
    }
    .filter-chip.active { background: var(--accent); color: white; border-color: var(--accent); }

    .chat-list {
      flex: 1;
      overflow-y: auto;
    }
    .chat-item {
      padding: 15px 20px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      display: flex;
      gap: 15px;
      position: relative;
    }
    .chat-item:hover { background: rgba(255,255,255,0.03); }
    .chat-item.active { background: rgba(67, 97, 238, 0.1); }
    .chat-avatar {
      width: 50px; height: 50px; background: var(--card); border-radius: 50%;
      display: flex; align-items: center; justify-content: center; font-weight: bold;
    }
    .chat-info { flex: 1; min-width: 0; }
    .chat-info h4 { font-size: 0.95rem; margin-bottom: 4px; }
    .chat-info p { font-size: 0.8rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .unread-badge {
      position: absolute; right: 20px; bottom: 15px;
      width: 10px; height: 10px; background: var(--pink); border-radius: 50%;
    }

    /* Header active chat */
    .chat-window-header {
      padding: 15px 25px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .chat-scroller {
      flex: 1;
      overflow-y: auto;
      padding: 25px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
      background-blend-mode: overlay;
    }

    .bubble {
      max-width: 75%;
      padding: 10px 15px;
      border-radius: 12px;
      font-size: 0.92rem;
      position: relative;
      word-wrap: break-word;
    }
    .bubble.in { align-self: flex-start; background: var(--wa-in); border-bottom-left-radius: 2px; }
    .bubble.out { align-self: flex-end; background: var(--wa-out); border-bottom-right-radius: 2px; text-align: right; }
    .bubble-meta { font-size: 0.65rem; color: var(--text-muted); margin-top: 5px; display: block; }

    .input-area {
      padding: 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .input-area textarea {
      flex: 1; background: var(--card); border: 1px solid var(--border);
      color: white; border-radius: 12px; padding: 12px; height: 50px;
      resize: none; outline: none; font-family: inherit;
    }
    .send-btn {
      width: 50px; height: 50px; border-radius: 50%; background: var(--accent);
      border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: transform 0.2s;
    }
    .send-btn:active { transform: scale(0.9); }

    /* AUTH OVERLAY */
    #auth-overlay {
      position: fixed; inset: 0; background: var(--bg); z-index: 1000;
      display: flex; align-items: center; justify-content: center;
    }
    .auth-card {
      background: var(--surface); padding: 40px; border-radius: 24px;
      width: 90%; max-width: 400px; text-align: center; border: 1px solid var(--border);
    }

    /* Mobile Back */
    .back-btn { display: none; margin-right: 15px; cursor: pointer; font-size: 1.2rem; }

    @media (max-width: 768px) {
      .sidebar { width: 100%; position: absolute; height: 100%; left: 0; z-index: 50; }
      .sidebar.hidden { left: -100%; }
      .back-btn { display: block; }
    }
  </style>
</head>
<body onload="initApp()">

  <div id="auth-overlay">
    <div class="auth-card">
      <img src="Kashifdawar.jpg" width="80" style="border-radius: 50%; margin-bottom: 20px;">
      <h2>Command Center</h2>
      <p style="color: var(--text-muted); font-size: 0.8rem; margin-top: 5px;">Kashif Dawar Private Access</p>
      <input type="password" id="admin-pass" placeholder="Enter PIN..." 
             style="width: 100%; padding: 12px; margin: 20px 0; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: white; text-align: center;">
      <button onclick="checkAuth()" style="width: 100%; padding: 12px; background: var(--accent); border: none; color: white; border-radius: 8px; font-weight: 600;">Unlock Dashboard</button>
    </div>
  </div>

  <div class="app-container">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2 style="font-size: 1.4rem;">Chats</h2>
        <div class="search-container">
          <input type="text" id="search-box" placeholder="Search contacts..." oninput="handleSearch(this.value)">
        </div>
      </div>
      
      <div class="filter-row">
        <div class="filter-chip active" onclick="setFilter('all', this)">All</div>
        <div class="filter-chip" onclick="setFilter('unread', this)">Unread</div>
        <div class="filter-chip" onclick="setFilter('today', this)">Today</div>
      </div>

      <div class="chat-list" id="chat-list-items">
        <!-- Injected -->
      </div>
    </aside>

    <main class="main-panel">
      <header class="chat-window-header">
        <div style="display: flex; align-items: center;">
          <span class="back-btn" onclick="toggleSidebar(true)">←</span>
          <div id="header-avatar" class="chat-avatar" style="width: 40px; height: 40px; margin-right: 12px; background: var(--accent);">?</div>
          <div>
            <h3 id="active-chat-name" style="font-size: 1rem;">Select a Visitor</h3>
            <span id="active-chat-status" style="font-size: 0.7rem; color: var(--green);">Ready for messages</span>
          </div>
        </div>
        <div id="visitor-details" style="text-align: right; font-size: 0.7rem; color: var(--text-muted);"></div>
      </header>

      <div class="chat-scroller" id="chat-scroller">
        <!-- Messages Injected -->
      </div>

      <div class="input-area">
        <textarea id="reply-input" placeholder="Type your reply here..."></textarea>
        <button class="send-btn" id="send-btn" onclick="sendReply()">➤</button>
      </div>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    // ══════════════ 1. FIREBASE CONFIG (PRESERVED) ══════════════
    const firebaseConfig = {
      apiKey: "AIzaSyCLJ0NBZ4RsdUiW_P4jUddQzUXvktmdMhc",
      authDomain: "kashif-portfolio-17481.firebaseapp.com",
      databaseURL: "https://kashif-portfolio-17481-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "kashif-portfolio-17481",
      storageBucket: "kashif-portfolio-17481.appspot.com",
      messagingSenderId: "563531649931",
      appId: "1:563531649931:web:ca5a2789f2de2d29486c75"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let allContacts = [];
    let activeId = null;
    let currentFilter = 'all';
    let searchQuery = '';

    // ══════════════ 2. AUTH & PWA ══════════════
    window.checkAuth = () => {
      if(document.getElementById('admin-pass').value === "kashif508") {
        document.getElementById('auth-overlay').style.display = 'none';
        localStorage.setItem('kashif_admin_active', 'true');
        if('Notification' in window) Notification.requestPermission();
      }
    };

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('admin-sw.js');
    }

    // ══════════════ 3. SOUND SYSTEM (PRESERVED) ══════════════
    function playTone(freqs, duration=0.4, vol=0.2) {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const master = ctx.createGain(); master.gain.value = vol; master.connect(ctx.destination);
        freqs.forEach(f => {
          const o = ctx.createOscillator(); const g = ctx.createGain();
          o.type = f.type || 'sine'; o.frequency.value = f.hz;
          g.gain.setValueAtTime(f.at || 0.1, ctx.currentTime);
          g.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + duration);
          o.connect(g); g.connect(master); o.start(); o.stop(ctx.currentTime + duration);
        });
      } catch(e){}
    }

    const sound = {
      newMsg: () => playTone([{hz:880, at:0.1}, {hz:1046, at:0.1}], 0.4),
      visitor: () => playTone([{hz:440, at:0.05}], 0.3, 0.12),
      reply: () => playTone([{hz:523, at:0.1}, {hz:659, at:0.1}, {hz:784, at:0.2}], 0.5)
    };

    // ══════════════ 4. CORE DATA ══════════════
    window.initApp = () => {
      if(localStorage.getItem('kashif_admin_active') === 'true') {
        document.getElementById('auth-overlay').style.display = 'none';
      }

      onValue(ref(db, 'contacts'), (snap) => {
        const data = snap.val();
        if(!data) return;
        
        const prevCount = allContacts.length;
        allContacts = Object.entries(data).map(([id, val]) => ({ id, ...val }));
        
        if(prevCount > 0 && allContacts.length > prevCount) {
          sound.newMsg();
          showPush("New Message", "A client just sent a message!");
        }
        
        renderList();
        if(activeId) renderChat(activeId);
      });

      onValue(ref(db, 'visitors'), (snap) => {
        if(snap.exists()) sound.visitor();
      });
    };

    function renderList() {
      const list = document.getElementById('chat-list-items');
      list.innerHTML = '';
      
      const filtered = allContacts.filter(c => {
        const matchesSearch = c.name?.toLowerCase().includes(searchQuery) || c.email?.toLowerCase().includes(searchQuery);
        if(currentFilter === 'unread') return matchesSearch && !c.replied;
        if(currentFilter === 'today') return matchesSearch && new Date(c.time).toDateString() === new Date().toDateString();
        return matchesSearch;
      }).sort((a,b) => b.time - a.time);

      filtered.forEach(c => {
        const div = document.createElement('div');
        div.className = `chat-item ${activeId === c.id ? 'active' : ''}`;
        div.onclick = () => selectChat(c.id);
        
        div.innerHTML = `
          <div class="chat-avatar">${(c.name || '?').charAt(0).toUpperCase()}</div>
          <div class="chat-info">
            <h4>${c.name || 'Visitor'}</h4>
            <p>${c.message}</p>
          </div>
          ${!c.replied ? '<div class="unread-badge"></div>' : ''}
          <div style="font-size: 0.65rem; color: var(--text-muted);">${new Date(c.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
        `;
        list.appendChild(div);
      });
    }

    window.selectChat = (id) => {
      activeId = id;
      renderList();
      renderChat(id);
      if(window.innerWidth < 768) toggleSidebar(false);
    };

    function renderChat(id) {
      const c = allContacts.find(x => x.id === id);
      const scroller = document.getElementById('chat-scroller');
      document.getElementById('active-chat-name').innerText = c.name || 'Visitor';
      document.getElementById('header-avatar').innerText = (c.name || '?').charAt(0).toUpperCase();
      document.getElementById('visitor-details').innerHTML = `IP: ${c.ip || 'Unknown'}<br>${c.city || ''} ${c.flag || ''}`;

      scroller.innerHTML = `
        <div class="bubble in">
          ${c.message}
          <span class="bubble-meta">${new Date(c.time).toLocaleString()}</span>
        </div>
      `;

      if(c.replied) {
        scroller.innerHTML += `
          <div class="bubble out">
            ${c.reply_content || 'Replied via EmailJS'}
            <span class="bubble-meta">Sent ✔✔</span>
          </div>
        `;
      }
      scroller.scrollTop = scroller.scrollHeight;
    }

    // ══════════════ 5. EMAILJS (PRESERVED) ══════════════
    window.sendReply = async () => {
      const val = document.getElementById('reply-input').value;
      if(!activeId || !val) return;
      const c = allContacts.find(x => x.id === activeId);
      const btn = document.getElementById('send-btn');
      btn.innerText = '⏳';

      try {
        emailjs.init("YOUR_PUBLIC_KEY"); // REPLACE WITH YOUR ACTUAL KEY
        await emailjs.send("service_id", "template_id", {
          to_name: c.name,
          to_email: c.email,
          message: val,
          from_name: "Kashif Dawar"
        });

        await update(ref(db, `contacts/${activeId}`), {
          replied: true,
          reply_content: val,
          reply_time: Date.now()
        });

        sound.reply();
        document.getElementById('reply-input').value = '';
        btn.innerText = '➤';
      } catch(e) {
        alert("Email error. Logic kept but key required.");
        btn.innerText = '✗';
      }
    };

    // Utils
    window.handleSearch = (v) => { searchQuery = v.toLowerCase(); renderList(); };
    window.setFilter = (f, el) => {
      document.querySelector('.filter-chip.active').classList.remove('active');
      el.classList.add('active');
      currentFilter = f;
      renderList();
    };
    window.toggleSidebar = (show) => {
      document.getElementById('sidebar').classList.toggle('hidden', !show);
    };
    function showPush(t, b) {
      if(Notification.permission === 'granted' && document.visibilityState !== 'visible') {
        new Notification(t, { body: b, icon: 'Kashifdawar.jpg' });
      }
    }
  </script>
</body>
</html>
